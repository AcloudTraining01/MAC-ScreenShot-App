name: Build macOS Installer

# ── Trigger ───────────────────────────────────────────────
# Runs automatically when a new Release is published on GitHub.
# To create a release: GitHub → Releases → "Draft a new release"
# → set a tag like v1.0.0 → Publish release.
on:
  release:
    types: [published]

  # Also allow manual runs from the GitHub Actions tab
  workflow_dispatch:

# ── Permissions ───────────────────────────────────────────
permissions:
  contents: write   # needed to upload release assets

# ── Jobs ──────────────────────────────────────────────────
jobs:

  # ── Apple Silicon (arm64) ─────────────────────────────
  build-arm64:
    name: Build macOS DMG (arm64 / Apple Silicon)
    runs-on: macos-14   # Apple Silicon M1 runner

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build arm64 installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run build && npx electron-builder --mac --arm64 --config electron-builder.config.js

      - name: Upload arm64 DMG
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/**/*arm64*.dmg
            release/**/*arm64*.zip
            release/**/*arm64*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Intel (x64) ───────────────────────────────────────
  build-x64:
    name: Build macOS DMG (x64 / Intel)
    runs-on: macos-13   # Intel (x64) runner

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build x64 installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run build && npx electron-builder --mac --x64 --config electron-builder.config.js

      - name: Upload x64 DMG
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/**/*x64*.dmg
            release/**/*x64*.zip
            release/**/*x64*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Upload shared update metadata after both builds ──
  upload-metadata:
    name: Upload update metadata
    runs-on: ubuntu-latest
    needs: [build-arm64, build-x64]
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build to generate latest-mac.yml (arm64 reference)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run build && npx electron-builder --mac --arm64 --config electron-builder.config.js || true

      - name: Upload update metadata
        uses: softprops/action-gh-release@v2
        with:
          files: release/**/latest-mac.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
