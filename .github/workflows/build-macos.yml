name: Build macOS Installer

# ── Triggers ──────────────────────────────────────────────────────────────────
#
#  1. Automatically when a GitHub Release is published
#  2. Manually from Actions tab — specify a release tag to attach the DMG to
#
on:
  release:
    types: [published]

  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to attach DMG to (e.g. v1.0.5). Leave blank to skip upload.'
        required: false
        default: ''

# ── Permissions ───────────────────────────────────────────────────────────────
permissions:
  contents: write

# ── Job ───────────────────────────────────────────────────────────────────────
jobs:
  build-macos:
    name: Build macOS Universal DMG
    runs-on: macos-latest   # Apple Silicon runner (arm64)

    env:
      RELEASE_TAG: ${{ github.event_name == 'release' && github.ref_name || inputs.tag_name }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node.js 20 ────────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Install dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Build the JS/TS bundle ─────────────────────────────────────────────
      - name: Build (electron-vite)
        run: npm run build

      # ── 5. Package Universal DMG + ZIP ────────────────────────────────────────
      #    --universal merges arm64 + x64 Electron binaries into a single fat binary.
      #    Works natively on Apple Silicon AND Intel without Rosetta.
      #    identity: null in electron-builder.config.js provides ad-hoc self-signing
      #    which prevents the hard "damaged" error on macOS 13+.
      - name: Package Universal DMG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --mac --universal --config electron-builder.config.js

      # ── 6. Verify artifacts ───────────────────────────────────────────────────
      - name: List built artifacts
        run: |
          echo "=== Built files ==="
          find release -type f \( -name "*.dmg" -o -name "*.zip" -o -name "*.yml" -o -name "*.blockmap" \) | sort
          echo ""
          echo "=== DMG sizes ==="
          find release -name "*.dmg" -exec du -sh {} \;

      # ── 7. Upload Universal DMG ───────────────────────────────────────────────
      - name: Upload Universal DMG
        if: env.RELEASE_TAG != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: release/**/*.dmg
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 8. Upload ZIP (electron auto-updater) ─────────────────────────────────
      - name: Upload ZIP
        if: env.RELEASE_TAG != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: release/**/*.zip
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 9. Upload update metadata (electron auto-updater) ────────────────────
      - name: Upload update metadata
        if: env.RELEASE_TAG != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            release/**/*.blockmap
            release/**/latest-mac.yml
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 10. Always save artifacts to this Actions run ─────────────────────────
      - name: Save artifacts
        uses: actions/upload-artifact@v4
        with:
          name: snapforge-macos-universal
          retention-days: 14
          path: |
            release/**/*.dmg
            release/**/*.zip
            release/**/latest-mac.yml
