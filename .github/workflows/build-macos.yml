name: Build macOS Installer

# ── Trigger ───────────────────────────────────────────────
on:
  release:
    types: [published]

  workflow_dispatch:

# ── Permissions ───────────────────────────────────────────
permissions:
  contents: write

# ── Job ───────────────────────────────────────────────────
jobs:
  build-macos:
    name: Build macOS DMGs (arm64 + x64)
    runs-on: macos-latest   # Apple Silicon (arm64) runner

    steps:
      # 1. Check out the repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Set up Node.js 20 (LTS)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Build the JS/TS bundle (electron-vite)
      - name: Build renderer + main
        run: npm run build

      # 5. Package arm64 DMG
      - name: Package arm64 DMG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          # Disable code signing — app must be opened via right-click → Open
          # on first launch (standard for unsigned Mac apps)
        run: npx electron-builder --mac --arm64 --config electron-builder.config.js

      # 6. Package x64 (Intel) DMG
      #    electron-builder cross-compiles x64 from arm64 runner using Rosetta layer
      - name: Package x64 DMG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --mac --x64 --config electron-builder.config.js

      # 7. List what was built (for debugging)
      - name: List release artifacts
        run: find release -type f | sort

      # 8. Upload arm64 DMG
      - name: Upload arm64 DMG
        uses: softprops/action-gh-release@v2
        with:
          files: release/**/*arm64*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 9. Upload x64 DMG
      - name: Upload x64 DMG
        uses: softprops/action-gh-release@v2
        with:
          files: release/**/*x64*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 10. Upload ZIP files (used by auto-updater)
      - name: Upload ZIP files
        uses: softprops/action-gh-release@v2
        with:
          files: release/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 11. Upload blockmap + metadata (used by electron auto-updater)
      - name: Upload update metadata
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/**/*.blockmap
            release/**/latest-mac.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
